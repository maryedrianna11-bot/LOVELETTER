<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open When Letters</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* --- EDITABLE COLORS --- */
            --bg-color: #fff5f7;
            --primary-pink: #ffafcc;
            --secondary-pink: #ff8fab;
            --accent-cream: #fdf0d5;
            --text-dark: #4a4a4a;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --shadow: 0 8px 32px 0 rgba(255, 182, 193, 0.37);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow-x: hidden;
            transition: background 0.5s ease;
        }

        /* --- BACKGROUND ANIMATION --- */
        .floating-hearts {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
        }

        .heart {
            position: absolute;
            color: var(--primary-pink);
            font-size: 20px;
            animation: float 6s linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* --- PASSWORD PAGE --- */
        #lock-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--accent-cream), var(--primary-pink));
            position: fixed; width: 100%; z-index: 999;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lock-box {
            background: var(--glass-bg);
            padding: 2rem; border-radius: 20px;
            backdrop-filter: blur(8px);
            text-align: center; box-shadow: var(--shadow);
            width: 90%; max-width: 400px;
        }

        input {
            width: 100%; padding: 12px; margin: 15px 0;
            border: 2px solid var(--primary-pink);
            border-radius: 10px; outline: none; text-align: center;
        }

        button {
            background: var(--secondary-pink);
            color: white; border: none; padding: 10px 25px;
            border-radius: 20px; cursor: pointer; font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        button:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--secondary-pink); }

        /* --- MAIN WEBSITE --- */
        #main-content { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }

        header { text-align: center; padding: 40px 0; }
        .title { font-family: 'Dancing Script', cursive; font-size: 3rem; color: var(--secondary-pink); }
        .sub-title { font-size: 1.1rem; opacity: 0.8; margin-top: 10px; }

        .anniversary-counter {
            background: var(--glass-bg);
            margin: 20px auto; padding: 15px; border-radius: 15px;
            display: inline-block; font-weight: bold; box-shadow: var(--shadow);
        }

        /* --- SEARCH & TOOLS --- */
        .controls {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 30px;
        }

        #searchBar { width: 100%; max-width: 400px; margin-bottom: 0; }

        /* --- GRID --- */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .category-card {
            background: white; padding: 20px; border-radius: 20px;
            text-align: center; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px solid transparent;
        }

        .category-card:hover {
            transform: translateY(-5px); border-color: var(--primary-pink);
        }

        .icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }

        /* --- MODAL --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            z-index: 1000; backdrop-filter: blur(5px);
            justify-content: center; align-items: center;
        }

        .modal-content {
            background: var(--bg-color);
            width: 90%; max-width: 500px;
            padding: 30px; border-radius: 30px;
            position: relative; max-height: 80vh; overflow-y: auto;
            text-align: center; box-shadow: var(--shadow);
        }

        .letter-text {
            font-family: 'Quicksand', sans-serif;
            line-height: 1.8; font-size: 1.1rem;
            white-space: pre-line; margin-top: 20px;
        }

        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; }
        .nav-btns { display: flex; justify-content: space-between; margin-top: 20px; }

        /* --- PROGRESS BAR --- */
        .progress-container { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin: 20px 0; }
        #progress-bar { width: 0%; height: 100%; background: var(--secondary-pink); border-radius: 5px; transition: 0.5s; }

        footer { text-align: center; padding: 40px; font-size: 0.9rem; opacity: 0.7; }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .title { font-size: 2rem; }
            .category-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="floating-hearts" id="heartContainer"></div>

    <!-- 1. PASSWORD SCREEN -->
    <section id="lock-screen">
        <div class="lock-box">
            <h2 style="font-family: 'Dancing Script'; margin-bottom: 10px;">Hello My Love...</h2>
            <p>Enter our special password to enter</p>
            <input type="password" id="passwordInput" placeholder="Our Secret Word">
            <button onclick="checkPassword()">Unlock My Heart</button>
            <p id="error-msg" style="color: #ff4d6d; margin-top: 10px; display: none;">That's not it, baby. Try again! ❤️</p>
        </div>
    </section>

    <!-- 2. MAIN CONTENT -->
    <main id="main-content">
        <header>

            <div class="anniversary-counter" id="daysCounter">Loading days...</div>
            
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <p id="statsText">0% of letters read</p>
        </header>

        <div class="controls">
            <input type="text" id="searchBar" placeholder="Search a mood..." onkeyup="filterCategories()">
            <button onclick="openRandomLetter()">Surprise Me! 🎲</button>
            <button onclick="toggleMusic()" id="musicBtn">🎵 Play Music</button>
        </div>

        <div class="category-grid" id="categoryGrid">
            <!-- JavaScript will populate this -->
        </div>

        <footer>
            Made with love ❤️<br>
            <span id="footerNames">You & Me Forever</span>
        </footer>
    </main>

    <!-- 3. LETTER MODAL -->
    <div class="modal" id="letterModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="font-family: 'Dancing Script'; color: var(--secondary-pink);"></h2>
            <div class="letter-text" id="letterBody"></div>
            <div class="nav-btns">
                <button onclick="prevLetter()">← Back</button>
                <button onclick="markAsRead()" id="readBtn">Mark as Read ✓</button>
                <button onclick="nextLetter()">Next →</button>
            </div>
        </div>
    </div>

        /* 
           =========================================
           --- CORE FUNCTIONALITY (DO NOT EDIT) ---
           =========================================
        */

        let currentCat = null;
        let currentLetterIdx = 0;
        let readLetters = JSON.parse(localStorage.getItem('readLetters')) || {};

        // 1. Password Logic
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input.toLowerCase() === CONFIG.password.toLowerCase()) {
                document.getElementById('lock-screen').style.transform = 'translateY(-100%)';
                document.getElementById('main-content').style.display = 'block';
                initApp();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        // 2. Initialize App
        function initApp() {
            createHearts();
            updateCounter();
            renderCategories(CONFIG.categories);
            updateProgress();
            document.getElementById('footerNames').innerText = CONFIG.names;
            document.getElementById('mainTitle').innerText = `FOR MyLove ${CONFIG.names.split(' ')[0] || 'Love'}`;
        }

        // 3. Heart Animation
        function createHearts() {
            const container = document.getElementById('heartContainer');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 6000);
            }, 500);
        }

        // 4. Anniversary Counter
        function updateCounter() {
            const start = new Date(CONFIG.anniversaryDate);
            const now = new Date();
            const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
            document.getElementById('daysCounter').innerText = `${diff} Days of Loving You`;
        }

        // 5. Render Categories
        function renderCategories(cats) {
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = '';
            cats.forEach(cat => {
                const card = document.createElement('div');
                card.classList.add('category-card');
                card.onclick = () => openCategory(cat.id);
                card.innerHTML = `
                    <span class="icon">${cat.icon}</span>
                    <strong>${cat.name}</strong>
                    <p style="font-size:0.8rem; margin-top:5px; opacity:0.6">${cat.letters.length} letters</p>
                `;
                grid.appendChild(card);
            });
        }

        // 6. Search
        function filterCategories() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const filtered = CONFIG.categories.filter(c => c.name.toLowerCase().includes(term));
            renderCategories(filtered);
        }

        // 7. Modal Logic
        function openCategory(id) {
            currentCat = CONFIG.categories.find(c => c.id === id);
            currentLetterIdx = 0;
            showLetter();
        }

        function showLetter() {
            const modal = document.getElementById('letterModal');
            document.getElementById('modalTitle').innerText = currentCat.name;
            document.getElementById('letterBody').innerText = currentCat.letters[currentLetterIdx];
            
            // Check if read
            const letterId = `${currentCat.id}-${currentLetterIdx}`;
            const btn = document.getElementById('readBtn');
            btn.innerText = readLetters[letterId] ? "Read ✓" : "Mark as Read ✓";
            btn.style.opacity = readLetters[letterId] ? "0.5" : "1";

            modal.style.display = 'flex';
        }

        function nextLetter() {
            currentLetterIdx = (currentLetterIdx + 1) % currentCat.letters.length;
            showLetter();
        }

        function prevLetter() {
            currentLetterIdx = (currentLetterIdx - 1 + currentCat.letters.length) % currentCat.letters.length;
            showLetter();
        }

        function openRandomLetter() {
            const cat = CONFIG.categories[Math.floor(Math.random() * CONFIG.categories.length)];
            currentCat = cat;
            currentLetterIdx = Math.floor(Math.random() * cat.letters.length);
            showLetter();
        }

        function closeModal() {
            document.getElementById('letterModal').style.display = 'none';
        }

        // 8. Progress & Storage
        function markAsRead() {
            const letterId = `${currentCat.id}-${currentLetterIdx}`;
            readLetters[letterId] = true;
            localStorage.setItem('readLetters', JSON.stringify(readLetters));
            updateProgress();
            showLetter();
        }

        function updateProgress() {
            const total = CONFIG.categories.reduce((acc, cat) => acc + cat.letters.length, 0);
            const read = Object.keys(readLetters).length;
            const percent = Math.round((read / total) * 100);
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('statsText').innerText = `${percent}% of our story read (${read}/${total} letters)`;
        }

        // 9. Music Toggle
        let isPlaying = false;
        const music = document.getElementById('bgMusic');
        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                document.getElementById('musicBtn').innerText = "🎵 Play Music";
            } else {
                music.play();
                document.getElementById('musicBtn').innerText = "🎶 Pause Music";
            }
            isPlaying = !isPlaying;
        }

        // Close modal on outside click
        window.onclick = (e) => {
            if(e.target == document.getElementById('letterModal')) closeModal();
        }
    </script>
</body>
